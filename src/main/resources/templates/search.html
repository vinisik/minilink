<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniLink - Resultados</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<nav class="bg-blue-600 p-4 text-white">
    <div class="max-w-2xl mx-auto flex justify-between">
        <a href="/home" class="font-bold">⬅ Voltar ao Feed</a>
        <span>Resultados da busca</span>
    </div>
</nav>

<main class="max-w-xl mx-auto mt-8 px-4">
    <h2 class="text-xl font-bold mb-6 text-gray-700">Pessoas encontradas:</h2>

    <div class="space-y-4">
        <div th:each="result : ${results}" th:if="${result.id != user.id}"
             class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-gray-200">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                    <span th:text="${#strings.substring(result.username, 0, 1).toUpperCase()}">U</span>
                </div>
                <div>
                    <p class="font-bold" th:text="'@' + ${result.username}">@username</p>
                    <p class="text-sm text-gray-500" th:text="${result.name}">Nome Completo</p>
                </div>
            </div>

            <form th:action="'/friends/add/' + ${result.id}" method="POST">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-blue-700">
                    + Seguir
                </button>
            </form>
        </div>

        <p th:if="${#lists.isEmpty(results)}" class="text-center text-gray-500">Nenhum usuário encontrado.</p>
    </div>
</main>
</body>
</html>
