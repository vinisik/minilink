<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniLink - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans antialiased">
<div class="bg-white p-10 rounded-3xl shadow-xl shadow-slate-200/50 w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-blue-600 tracking-tight">Criar Conta</h1>
        <p class="text-slate-500 mt-2 font-medium">Junte-se à comunidade</p>
    </div>

    <form action="/cadastro" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
            <input type="text" name="name" required
                   class="w-full p-3 bg-slate-100 border-transparent focus:bg-white border focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 rounded-xl outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Username (@)</label>
            <input type="text" name="username" required
                   class="w-full p-3 bg-slate-100 border-transparent focus:bg-white border focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 rounded-xl outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Bio (Breve descrição)</label>
            <textarea name="bio" rows="2"
                      class="w-full p-3 bg-slate-100 border-transparent focus:bg-white border focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 rounded-xl outline-none transition-all resize-none"></textarea>
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
            <input type="password" name="password" required
                   class="w-full p-3 bg-slate-100 border-transparent focus:bg-white border focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 rounded-xl outline-none transition-all">
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 active:scale-[0.98] transition-all shadow-md shadow-blue-600/20 mt-6">
            Finalizar Cadastro
        </button>
    </form>

    <p class="mt-8 text-center text-sm text-slate-500 font-medium">
        Já tem uma conta? <a href="/login" class="text-blue-600 font-bold hover:underline">Faça login</a>
    </p>
</div>
</body>
</html>
