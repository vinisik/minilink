<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniLink - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

<nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
        <a href="/home" class="text-2xl font-extrabold text-blue-600 tracking-tight">MiniLink</a>
        <div class="flex items-center gap-4">
            <a th:href="'/profile/' + ${user.id}" class="font-semibold text-slate-700 hover:text-blue-600 transition-colors" th:text="${user.name}">Meu Perfil</a>
            <a href="/logout" class="text-slate-400 hover:text-red-500 font-medium text-sm transition-colors">Sair</a>
        </div>
    </div>
</nav>

<main class="max-w-2xl mx-auto mt-6 px-4 pb-12">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 mb-6 overflow-hidden">
        <div class="h-32 sm:h-40 bg-gradient-to-tr from-blue-600 to-indigo-400 relative"></div>

        <div class="px-6 pb-6 relative">
            <div class="flex justify-between items-end -mt-12 sm:-mt-16 mb-4">
                <div class="w-24 h-24 sm:w-32 sm:h-32 bg-white rounded-full p-1.5 relative z-10 border border-slate-100">
                    <div class="w-full h-full bg-slate-100 rounded-full flex items-center justify-center text-blue-600 text-3xl sm:text-4xl font-bold">
                        <span th:text="${#strings.substring(profileUser.username, 0, 1).toUpperCase()}">U</span>
                    </div>
                </div>

                <div class="mb-2">
                    <a th:if="${isOwnProfile}" href="/profile/edit" class="border border-slate-300 text-slate-800 px-5 py-2 rounded-full font-bold hover:bg-slate-50 transition-colors text-sm inline-block">
                        Editar Perfil
                    </a>

                    <div th:unless="${isOwnProfile}">
                        <form th:if="${isFriend}" th:action="'/friends/remove/' + ${profileUser.id}" method="POST">
                            <button type="submit" class="border border-red-300 text-red-600 px-5 py-2 rounded-full font-bold hover:bg-red-50 transition-colors text-sm group">
                                <span class="group-hover:hidden">Seguindo</span>
                                <span class="hidden group-hover:inline">Deixar de seguir</span>
                            </button>
                        </form>
                        <form th:unless="${isFriend}" th:action="'/friends/add/' + ${profileUser.id}" method="POST">
                            <button type="submit" class="bg-slate-900 text-white px-5 py-2 rounded-full font-bold hover:bg-slate-800 transition-colors text-sm">
                                Seguir
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div>
                <h1 class="text-2xl font-bold text-slate-900 leading-tight" th:text="${profileUser.name}">Nome</h1>
                <p class="text-slate-500 font-medium" th:text="'@' + ${profileUser.username}">@username</p>
                <p class="mt-4 text-slate-800 whitespace-pre-line text-[15px] leading-relaxed" th:text="${profileUser.bio}">Bio do usuário...</p>
            </div>
        </div>

        <div class="flex border-t border-slate-100">
            <button onclick="switchTab('posts')" id="btn-posts" class="flex-1 py-4 text-center font-bold text-slate-900 border-b-4 border-blue-500 transition-colors hover:bg-slate-50">Postagens</button>
            <button onclick="switchTab('friends')" id="btn-friends" class="flex-1 py-4 text-center font-bold text-slate-500 border-b-4 border-transparent hover:bg-slate-50 transition-colors">Seguindo</button>
        </div>
    </div>

    <div id="tab-posts" class="space-y-4">
        <div th:each="post : ${posts}" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-start mb-2">
                <span class="text-slate-400 text-sm font-medium" th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">Data</span>

                <button th:if="${post.user.id == user.id}" th:onclick="'deletarPost(' + ${post.id} + ')'"
                        class="text-slate-400 hover:text-red-500 transition-colors p-1 rounded-full hover:bg-red-50" title="Excluir postagem">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                    </svg>
                </button>
            </div>
            <p class="text-slate-800 text-[15px] leading-relaxed mt-1 whitespace-pre-wrap break-all" th:text="${post.content}">
                Conteúdo
            </p>
        </div>
        <p th:if="${#lists.isEmpty(posts)}" class="text-center text-slate-500 py-10 font-medium">Nenhum post ainda.</p>
    </div>

    <div id="tab-friends" class="space-y-4 hidden">
        <div th:each="friend : ${friends}" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-between hover:border-blue-300 transition-colors">
            <div class="flex items-center gap-4">
                <a th:href="'/profile/' + ${friend.id}" class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 font-bold hover:bg-slate-200 transition-colors">
                    <span th:text="${#strings.substring(friend.username, 0, 1).toUpperCase()}">F</span>
                </a>
                <div>
                    <a th:href="'/profile/' + ${friend.id}" class="font-bold text-slate-900 hover:underline" th:text="${friend.name}">Nome</a>
                    <p class="text-sm text-slate-500" th:text="'@' + ${friend.username}">@user</p>
                </div>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(friends)}" class="text-center text-slate-500 py-10 font-medium">Nenhum amigo adicionado.</p>
    </div>
</main>

<script th:inline="javascript">
    const currentUserId = [[${user.id}]];

    function switchTab(t) {
        document.getElementById('tab-posts').classList.toggle('hidden', t !== 'posts');
        document.getElementById('tab-friends').classList.toggle('hidden', t !== 'friends');

        const bp = document.getElementById('btn-posts');
        const bf = document.getElementById('btn-friends');

        if(t === 'posts') {
            bp.className = "flex-1 py-4 text-center font-bold text-slate-900 border-b-4 border-blue-500 transition-colors hover:bg-slate-50";
            bf.className = "flex-1 py-4 text-center font-bold text-slate-500 border-b-4 border-transparent hover:bg-slate-50 transition-colors";
        } else {
            bf.className = "flex-1 py-4 text-center font-bold text-slate-900 border-b-4 border-blue-500 transition-colors hover:bg-slate-50";
            bp.className = "flex-1 py-4 text-center font-bold text-slate-500 border-b-4 border-transparent hover:bg-slate-50 transition-colors";
        }
    }

    async function deletarPost(postId) {
        if(!confirm("Tem certeza que deseja apagar esta postagem?")) return;

        try {
            const response = await fetch(`/api/posts/${postId}?userId=${currentUserId}`, { method: 'DELETE' });
            if (response.ok) {
                window.location.reload();
            } else {
                alert("Não foi possível excluir a postagem.");
            }
        } catch (error) {
            console.error("Erro ao excluir:", error);
        }
    }
</script>
</body>
</html>
