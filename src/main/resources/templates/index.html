<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniLink - Rede Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<nav class="bg-blue-600 p-4 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center gap-4">
        <a href="/home" class="text-2xl font-extrabold tracking-tight">MiniLink</a>

        <form action="/search" method="GET" class="flex-1 max-w-md flex">
            <input type="text" name="query" placeholder="Buscar usuários..."
                   class="w-full p-2 rounded-l-lg text-black outline-none focus:ring-2 focus:ring-blue-300">
            <button type="submit" class="bg-blue-800 px-4 rounded-r-lg hover:bg-blue-900 transition-colors">🔍</button>
        </form>

        <div class="flex items-center gap-4">
            <a th:href="'/profile/' + ${user.id}" class="hidden md:inline font-medium hover:underline" th:text="${user.name}">Nome</a>
            <a href="/logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-bold text-sm transition-colors">
                Sair
            </a>
        </div>
    </div>
</nav>

<main class="max-w-3xl mx-auto mt-8 px-4 pb-12">

    <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-200">
        <h2 class="text-gray-700 font-bold mb-4 flex items-center gap-2">
            O que você está pensando?
        </h2>
        <div class="space-y-4">
                <textarea id="postContent"
                          class="w-full p-4 border border-gray-200 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"
                          rows="3"
                          placeholder="Compartilhe algo com seus amigos..."></textarea>
            <div class="flex justify-end">
                <button onclick="enviarPost()"
                        class="bg-blue-600 text-white px-8 py-2 rounded-full font-bold hover:bg-blue-700 transition-colors shadow-sm flex items-center gap-2">
                    Publicar
                </button>
            </div>
        </div>
    </div>

    <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest mb-4 px-1">Feed</h3>

    <div id="feed" class="space-y-4">
        <p th:if="${#lists.isEmpty(posts)}" class="text-center text-gray-500 mt-8 bg-white p-6 rounded-xl border border-dashed border-gray-300">
            Nenhuma postagem no seu feed ainda. Busque usuários e adicione amigos!
        </p>

        <div th:each="post : ${posts}" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:border-blue-300 transition-all">
            <div class="flex items-center gap-3 mb-4">
                <a th:href="'/profile/' + ${post.user.id}" class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold hover:bg-blue-200 transition-colors">
                    <span th:text="${#strings.substring(post.user.username, 0, 1).toUpperCase()}">U</span>
                </a>
                <div>
                    <a th:href="'/profile/' + ${post.user.id}" class="font-bold text-gray-900 hover:text-blue-600 hover:underline" th:text="'@' + ${post.user.username}">@usuario</a>
                    <p class="text-xs text-gray-400">Publicado agora</p>
                </div>
            </div>

            <p class="text-gray-700 text-lg leading-relaxed mb-6" th:text="${post.content}">
                Conteúdo do post
            </p>

            <div class="pt-4 border-t border-gray-50 flex items-center justify-between">
                <button th:onclick="'curtirPost(' + ${post.id} + ', this)'"
                        class="flex items-center gap-2 text-gray-500 hover:text-red-500 transition-colors font-semibold group">
                    <span class="text-xl group-hover:scale-110 transition-transform">❤️ Curtir</span>
                </button>

                <button class="text-gray-400 hover:text-blue-500 transition-colors">
                    💬 Comentar
                </button>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    // Pega o ID do Spring Boot de forma segura
    const currentUserId = [[${user.id}]];

    async function enviarPost() {
        const content = document.getElementById('postContent').value;
        if (!content.trim()) return;

        try {
            const response = await fetch(`/api/posts?userId=${currentUserId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: content
            });

            if (response.ok) {
                document.getElementById('postContent').value = "";
                window.location.reload();
            } else {
                alert("Ops! Verifique se o seu PostController está retornando o objeto Post.");
            }
        } catch (err) {
            console.error("Erro ao publicar:", err);
        }
    }

    async function curtirPost(postId, buttonElement) {
        try {
            const response = await fetch(`/api/posts/${postId}/like?userId=${currentUserId}`, {
                method: 'POST'
            });

            if (response.ok) {
                window.location.reload();
            }
        } catch (error) {
            console.error("Erro ao curtir:", error);
        }
    }
</script>
</body>
</html>
