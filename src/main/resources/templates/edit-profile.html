<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniLink - Editar Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">

<nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-4">
        <a th:href="'/profile/' + ${user.id}" class="text-slate-500 hover:text-slate-800 transition-colors font-bold text-xl mr-2">← Voltar</a>
        <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Editar Perfil</h1>
    </div>
</nav>

<main class="max-w-xl mx-auto mt-8 px-4 pb-12">
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">

        <form action="/profile/edit" method="POST" class="space-y-6">

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                <input type="text" th:value="${user.username}" readonly
                       class="w-full p-3 bg-slate-100 border-transparent text-slate-400 rounded-xl outline-none cursor-not-allowed">
                <p class="text-xs text-slate-400 mt-1">O nome de usuário (@) não pode ser alterado.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nome de Exibição</label>
                <input type="text" name="name" th:value="${user.name}" required
                       class="w-full p-3 bg-slate-100 border-transparent focus:bg-white border focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 rounded-xl outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Sua Bio</label>
                <textarea name="bio" rows="4" th:text="${user.bio}"
                          class="w-full p-3 bg-slate-100 border-transparent focus:bg-white border focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 rounded-xl outline-none transition-all resize-none"></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-slate-900 text-white p-3.5 rounded-xl font-bold hover:bg-slate-800 active:scale-[0.98] transition-all">
                    Salvar Alterações
                </button>
            </div>
        </form>

    </div>
</main>
</body>
</html>
